<script>
    async function analyze() {
        const btn = document.getElementById('btn');
        const resultsDiv = document.getElementById('results');
        
        const tickerInput = document.getElementById('tickers').value;
        const tickers = tickerInput.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
        const strategy = document.getElementById('strategy').value;

        if (tickers.length === 0) {
            resultsDiv.innerHTML = '<div class="error">Please enter at least one ticker.</div>';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Analyzing...';

        const cards = {};
        tickers.forEach(ticker => {
            cards[ticker] = { analysis: '', signal: null, latency: null };
        });

        resultsDiv.innerHTML = '<div class="results">' + tickers.map(ticker => `
            <div class="card" id="card-${ticker}">
                <div class="card-header">
                    <span class="ticker">${ticker}</span>
                    <span class="signal HOLD" id="signal-${ticker}">...</span>
                </div>
                <div class="analysis" id="analysis-${ticker}">Analyzing...</div>
                <div class="latency" id="latency-${ticker}"></div>
            </div>
        `).join('') + '</div>';

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tickers, strategy })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.complete) {
                                btn.disabled = false;
                                btn.textContent = 'Analyze Stocks';
                            } else if (data.error) {
                                document.getElementById(`analysis-${data.ticker}`).textContent = `Error: ${data.error}`;
                            } else if (data.token) {
                                cards[data.ticker].analysis += data.token;
                                document.getElementById(`analysis-${data.ticker}`).textContent = cards[data.ticker].analysis;
                            } else if (data.done) {
                                const signalEl = document.getElementById(`signal-${data.ticker}`);
                                signalEl.textContent = data.signal;
                                signalEl.className = `signal ${data.signal}`;
                                document.getElementById(`latency-${data.ticker}`).textContent = `${data.latency_ms}ms · ${strategy.replace('_', '-')}`;
                            }
                        } catch (e) {}
                    }
                }
            }
        } catch (err) {
            resultsDiv.innerHTML = '<div class="error">Could not connect to backend. Make sure app.py is running on port 5000.</div>';
            btn.disabled = false;
            btn.textContent = 'Analyze Stocks';
        }
    }
</script>
